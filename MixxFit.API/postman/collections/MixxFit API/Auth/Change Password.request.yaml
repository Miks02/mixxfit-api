$kind: http-request
name: Change Password
method: POST
url: '{{baseUrl}}/auth/password'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "currentPassword": "Password123!",
      "newPassword": "NewPassword123!",
      "confirmPassword": "NewPassword123!"
    }
