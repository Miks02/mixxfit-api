$kind: http-request
name: Create Exercise
method: POST
url: '{{baseUrl}}/exercises'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Bench Press",
      "categoryId": 1,
      "muscleGroupId": 1
    }
