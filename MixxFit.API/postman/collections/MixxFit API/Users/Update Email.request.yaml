$kind: http-request
name: Update Email
method: PATCH
url: '{{baseUrl}}/users/email'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "newemail@example.com"
    }
