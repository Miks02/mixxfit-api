$kind: http-request
name: Log Weight
method: POST
url: '{{baseUrl}}/weight-entries'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "weight": 80.5,
      "time": "08:30:00",
      "notes": "Morning weigh-in"
    }
