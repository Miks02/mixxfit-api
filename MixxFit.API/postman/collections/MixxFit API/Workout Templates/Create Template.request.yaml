$kind: http-request
name: Create Template
method: POST
url: '{{baseUrl}}/workout-templates'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Push Day",
      "notes": "Chest, shoulders, triceps",
      "exercises": [
        {
          "exerciseId": 1,
          "setCount": 4
        }
      ]
    }
