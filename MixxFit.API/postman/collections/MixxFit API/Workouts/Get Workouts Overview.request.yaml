$kind: http-request
name: Get Workouts Overview
method: GET
url: '{{baseUrl}}/workouts/overview'
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
queryParams:
  - key: sort
    value: ''
    disabled: true
  - key: search
    value: ''
    disabled: true
  - key: year
    value: ''
    disabled: true
  - key: month
    value: ''
    disabled: true
